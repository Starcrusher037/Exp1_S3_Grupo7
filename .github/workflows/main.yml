name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Permite gatillar el pipeline manualmente desde la interfaz de GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. CLONAR CÓDIGO: Descarga el código fuente del repositorio en la máquina virtual del runner
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. ENTORNO JAVA: Configura JDK 21 (Temurin) y activa la caché de Maven para acelerar futuras compilaciones
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. PERMISOS MAVEN: Le da permisos de ejecución al wrapper de Maven nativo para evitar fallos en Linux
      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      # 4. COMPILAR JAR: Limpia proyectos viejos, descarga dependencias y empaqueta el archivo .jar ignorando los test
      - name: Build with Maven (skip tests)
        run: ./mvnw clean package -DskipTests

      # 5. LOGIN DOCKER HUB: Se autentica en Docker Hub usando  credenciales guardadas de forma segura en los Secrets
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. CONSTRUIR IMAGEN: Compila la imagen Docker usando el Dockerfile y la etiqueta como 'latest'
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/microservicio-transportes:latest .

      # 7. SUBIR A DOCKER HUB: Sube la imagen empaquetada a los servidores públicos/privados de Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/microservicio-transportes:latest

      # 8. CREDENCIALES AWS: Autentica el runner de GitHub Actions con la cuenta de AWS Academy para operaciones de nube
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # 9. LLAVE SSH: Configura y resguarda la clave privada (.pem) dentro del runner para poder conectarse a la EC2
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 10. DESPLIEGUE EN EC2: Mapeo seguro usando los nombres reales de tus GitHub Secrets
      - name: SSH commands to deploy
        env:
          # Aquí usamos los nombres reales que tienes guardados en GitHub Actions
          SECRET_USER_BD: ${{ secrets.ORACLE_DB_USER }}
          SECRET_PASS_BD: ${{ secrets.ORACLE_DB_PASSWORD }}
          SECRET_AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET_AWS_SEC: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SECRET_AWS_TOK: ${{ secrets.AWS_SESSION_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} \
            DB_USERNAME="$SECRET_USER_BD" \
            DB_PASSWORD="$SECRET_PASS_BD" \
            AWS_ACCESS_KEY_ID="$SECRET_AWS_KEY" \
            AWS_SECRET_ACCESS_KEY="$SECRET_AWS_SEC" \
            AWS_SESSION_TOKEN="$SECRET_AWS_TOK" \
            << 'EOF'
            
            # Autenticar y descargar la última imagen en la EC2
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/microservicio-transportes:latest
            
            # RECONSTRUCCIÓN DE ORACLE WALLET CLOUD (Protegido por 'EOF')
            mkdir -p ~/oracle_wallet
            echo "${{ secrets.ORACLE_WALLET_BASE64 }}" | base64 --decode > ~/oracle_wallet/wallet.zip
            unzip -j -o ~/oracle_wallet/wallet.zip -d ~/oracle_wallet/
            sed -i 's|"?/network/admin"|"/app/wallet"|g' ~/oracle_wallet/sqlnet.ora
            rm -f ~/oracle_wallet/wallet.zip
            
            # REQUERIMIENTO EFS
            sudo mkdir -p /mnt/efs/guias
            sudo chmod 777 /mnt/efs/guias
            
            # LIMPIEZA: Detener contenedor previo si existe
            docker stop microservicio-transportes || true
            docker rm microservicio-transportes || true
            
            # ARRANQUE: Inyección limpia de variables heredadas por SSH hacia el contenedor
            docker run -d --name microservicio-transportes -p 8080:8080 \
              -v ~/oracle_wallet:/app/wallet \
              -v /mnt/efs/guias:/app/efs_storage \
              -e TNS_ADMIN_PATH="/app/wallet" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
              -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
              -e AWS_SESSION_TOKEN="$AWS_SESSION_TOKEN" \
              -e AWS_REGION="us-east-1" \
              -e AWS_S3_BUCKET="mibucketduoc" \
              -e RUTA_EFS="/app/efs_storage" \
              ${{ secrets.DOCKERHUB_USERNAME }}/microservicio-transportes:latest
          EOF