name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Permite gatillar el pipeline manualmente desde la interfaz de GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. CLONAR CÓDIGO: Descarga el código fuente del repositorio en la máquina virtual del runner
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. ENTORNO JAVA: Configura JDK 21 (Temurin) y activa la caché de Maven para acelerar futuras compilaciones
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. PERMISOS MAVEN: Le da permisos de ejecución al wrapper de Maven nativo para evitar fallos en Linux
      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      # 4. COMPILAR JAR: Limpia proyectos viejos, descarga dependencias y empaqueta el archivo .jar ignorando los test
      - name: Build with Maven (skip tests)
        run: ./mvnw clean package -DskipTests

      # 5. LOGIN DOCKER HUB: Se autentica en Docker Hub usando  credenciales guardadas de forma segura en los Secrets
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. CONSTRUIR IMAGEN: Compila la imagen Docker usando el Dockerfile y la etiqueta como 'latest'
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/microservicio-transportes:latest .

      # 7. SUBIR A DOCKER HUB: Sube la imagen empaquetada a los servidores públicos/privados de Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/microservicio-transportes:latest

      # 8. CREDENCIALES AWS: Autentica el runner de GitHub Actions con la cuenta de AWS Academy para operaciones de nube
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # 9. LLAVE SSH: Configura y resguarda la clave privada (.pem) dentro del runner para poder conectarse a la EC2
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 10. DESPLIEGUE EN EC2
      - name: SSH commands to deploy
        env:
          # GitHub procesa los secretos aquí de forma segura
          DB_USER: ${{ secrets.ORACLE_DB_USER }}
          DB_PASS: ${{ secrets.ORACLE_DB_PASSWORD }}
        run: |
          # Pasamos las variables directas al entorno de la sesión SSH
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} \
            DB_USERNAME="$DB_USER" \
            DB_PASSWORD="$DB_PASS" \
            << 'EOF'
            
            # Limpiar contenedor previo
            docker stop microservicio-transportes || true
            docker rm microservicio-transportes || true
            
            # Lanzar contenedor usando las variables heredadas de forma segura
            docker run -d --name microservicio-transportes -p 8080:8080 \
              -v ~/oracle_wallet:/app/wallet \
              -v /mnt/efs/guias:/app/efs_storage \
              -e TNS_ADMIN_PATH="/app/wallet" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
              -e AWS_REGION="us-east-1" \
              -e AWS_S3_BUCKET="mibucketduoc" \
              -e RUTA_EFS="/app/efs_storage" \
              starcrusher037/microservicio-transportes:latest
          EOF