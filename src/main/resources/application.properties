# ===================================================================
# CONFIGURACIÓN GENERAL DEL SERVIDOR
# ===================================================================
spring.application.name=transportes
server.port=8080

# Permitir subida de archivos PDF (Hasta 10MB por guía)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================================================
# CONEXIÓN A BASE DE DATOS (ORACLE CLOUD WALLET)
# ===================================================================
spring.datasource.url=jdbc:oracle:thin:@cloudbd_medium?TNS_ADMIN=${TNS_ADMIN_PATH}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configuración Hibernate JPA
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===================================================================
# REQUERIMIENTO EFS: STORAGE TEMPORAL
# ===================================================================
# En local usará C:/temp/efs si no se provee la variable. En EC2 usará la ruta del montaje real.
ruta.almacenamiento.temporal=${RUTA_EFS:C:/temp/efs}

# ===================================================================
# REQUERIMIENTO AWS S3 (NUBE)
# ===================================================================
aws.s3.bucket=${AWS_S3_BUCKET}

# Credenciales requeridas por Spring Cloud AWS 3.x
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
spring.cloud.aws.credentials.session-token=${AWS_SESSION_TOKEN}
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}

# Desactiva la comprobación automática de metadatos de EC2 para entorno local/Docker básico
spring.cloud.aws.stack.auto=false

